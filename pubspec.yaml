name: fishing_competition
description: "낚시 대회 관리 앱 - 웹/모바일 지원"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # 네트워크
  dio: ^5.8.0+1

  # 로컬 저장소
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # 유틸리티
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 이미지/동영상 피커
  image_picker: ^1.1.2
  video_compress: ^3.1.2
  video_player: ^2.9.2

  # SVG
  flutter_svg: ^2.0.17

  # 지도
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

  # 코드 생성
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

  # 커스텀 폰트 사용 시 assets/fonts/ 에 파일 추가 후 아래 주석 해제
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Pretendard-Bold.ttf
  #         weight: 700
